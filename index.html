<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>14/02</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Nunito", sans-serif; background: #0d0d0d; color: #fff; overflow-x: hidden; }

    .confetti-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .dot { position: absolute; border-radius: 50%; animation: fall linear infinite; }
    @keyframes fall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 0.6; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }

    .hero { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 20px; gap: 24px; }

    .gif-pierrot { width: 180px; height: 180px; object-fit: cover; border-radius: 50%; border: 3px solid #ff3e6c; }

    h1 { font-family: "Fredoka One", cursive; font-size: clamp(2.4rem, 7vw, 5rem); line-height: 1.1; color: #fff; letter-spacing: -1px; }
    h1 em { font-style: normal; color: #ff3e6c; }

    .sub { font-size: clamp(0.95rem, 2.5vw, 1.2rem); color: #888; max-width: 380px; line-height: 1.6; }

    .btn-row { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; align-items: center; position: relative; min-height: 70px; }

    .btn-accept { font-family: "Nunito", sans-serif; font-size: 0.95rem; padding: 10px 24px; border: 1px solid #333; border-radius: 8px; background: transparent; color: #555; cursor: pointer; transition: color 0.2s, border-color 0.2s; }
    .btn-accept:hover { color: #888; border-color: #555; }

    .btn-refuse {
      font-family: "Fredoka One", cursive;
      font-size: 1.3rem;
      padding: 16px 42px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #ff3e6c, #c94bff);
      color: #fff;
      cursor: pointer;
      position: fixed;
      letter-spacing: 0.5px;
      box-shadow: 0 0 24px rgba(255,62,108,0.5), 0 4px 16px rgba(0,0,0,0.4);
      animation: glow 2s ease-in-out infinite;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 10;
    }
    .btn-refuse.hide {
      opacity: 0;
      transform: scale(0.5);
      pointer-events: none;
    }
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 24px rgba(255,62,108,0.5), 0 4px 16px rgba(0,0,0,0.4); }
      50%       { box-shadow: 0 0 40px rgba(201,75,255,0.7), 0 4px 20px rgba(0,0,0,0.4); }
    }

    /* emoji triste */
    .sad-emoji {
      position: fixed;
      font-size: 3rem;
      pointer-events: none;
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.2s, transform 0.2s;
      z-index: 11;
    }
    .sad-emoji.show {
      opacity: 1;
      transform: scale(1);
    }
    .sad-emoji.hide {
      opacity: 0;
      transform: scale(0.3) translateY(-20px);
    }

    /* baú */
    #bau-page { display: none; position: fixed; inset: 0; background: #0d0d0d; z-index: 100; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 28px; padding: 30px; }
    #bau-page.show { display: flex; }

    .bau-container { position: relative; width: 220px; height: 220px; cursor: pointer; perspective: 600px; }
    .chest-body { position: absolute; bottom: 0; left: 0; width: 220px; height: 130px; background: linear-gradient(160deg, #8B4513, #5c2a00); border-radius: 0 0 14px 14px; border: 3px solid #3d1a00; box-shadow: inset 0 -6px 10px rgba(0,0,0,0.4); }
    .chest-band { position: absolute; top: 0; left: 0; width: 220px; height: 16px; background: #c8960c; border-top: 2px solid #f0c040; border-bottom: 2px solid #f0c040; }
    .chest-lock { position: absolute; top: -6px; left: 50%; transform: translateX(-50%); width: 28px; height: 26px; background: #c8960c; border-radius: 5px; border: 2px solid #f0c040; }
    .chest-lid { position: absolute; bottom: 126px; left: 0; width: 220px; height: 80px; background: linear-gradient(160deg, #a0522d, #6b300a); border-radius: 14px 14px 0 0; border: 3px solid #3d1a00; transform-origin: bottom center; transform: rotateX(0deg); transition: transform 0.8s cubic-bezier(0.4,0,0.2,1); }
    .chest-lid.open { transform: rotateX(-110deg); }
    .chest-gift { position: absolute; bottom: 130px; left: 50%; transform: translateX(-50%) scaleY(0); transform-origin: bottom center; transition: transform 0.6s 0.5s cubic-bezier(0.34,1.56,0.64,1); width: 150px; }
    .chest-gift.show { transform: translateX(-50%) scaleY(1); }
    .chest-gift img { width: 100%; }

    .bau-hint { color: #555; font-size: 0.9rem; animation: pulse 1.5s ease-in-out infinite; transition: opacity 0.4s; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .gift-msg { font-family: "Fredoka One", cursive; font-size: clamp(1.1rem, 3vw, 1.6rem); color: #fff; opacity: 0; transition: opacity 0.6s 1.2s; max-width: 380px; line-height: 1.4; }
    .gift-msg.show { opacity: 1; }
    .gift-msg em { font-style: normal; color: #ff3e6c; }

    .btn-voltar { font-family: "Fredoka One", cursive; padding: 10px 24px; border: 1px solid #333; border-radius: 8px; background: transparent; color: #555; font-size: 0.95rem; cursor: pointer; opacity: 0; transition: opacity 0.4s 1.8s; }
    .btn-voltar.show { opacity: 1; }
  </style>
</head>

    <div class="chest-lid" id="chest-lid"></div>
    <div class="chest-body">
      <div class="chest-band">
        <div class="chest-lock"></div>
      </div>
    </div>
  </div>
  <p class="gift-msg" id="gift-msg">O presente é esse :3,<br>minha querida <em>palhacinha</em></p>
  <button class="btn-voltar" id="btn-voltar" onclick="voltarHero()">← voltar</button>
</div>

<script>
  // confetti
  const colors = ["#ff3e6c","#ff8c42","#c94bff","#ffffff","#ffda29"];
  const wrap = document.getElementById("confetti");
  for (let i = 0; i < 30; i++) {
    const d = document.createElement("div");
    d.className = "dot";
    const size = Math.random() * 6 + 3;
    d.style.cssText = "width:"+size+"px;height:"+size+"px;background:"+colors[Math.floor(Math.random()*colors.length)]+";left:"+Math.random()*100+"%;animation-duration:"+(Math.random()*8+5)+"s;animation-delay:"+Math.random()*6+"s;";
    wrap.appendChild(d);
  }

  // posiciona o botão recusar aleatoriamente na tela
  const refuse = document.getElementById("btn-refuse");
  const sad = document.getElementById("sad-emoji");
  let refusing = false;

  function posicaoAleatoria() {
    const bw = refuse.offsetWidth, bh = refuse.offsetHeight;
    const maxX = window.innerWidth - bw - 20;
    const maxY = window.innerHeight - bh - 20;
    const x = Math.random() * maxX + 10;
    const y = Math.random() * maxY + 10;
    refuse.style.left = x + "px";
    refuse.style.top = y + "px";
  }

  // posição inicial
  window.addEventListener("load", () => {
    posicaoAleatoria();
  });

  // mouse hover (desktop)
  refuse.addEventListener("mouseenter", fugir);

  function fugir() {
    posicaoAleatoria();
  }

  // touch (mobile) — some, mostra emoji, reaparece em outro lugar
  function fugirTouch(btn, e) {
    e.preventDefault();
    if (refusing) return;
    refusing = true;

    // some o botão
    refuse.classList.add("hide");

    // mostra emoji no lugar onde estava o botão
    const rect = refuse.getBoundingClientRect();
    sad.style.left = (rect.left + rect.width/2 - 24) + "px";
    sad.style.top = (rect.top + rect.height/2 - 24) + "px";
    sad.classList.remove("hide");
    sad.classList.add("show");

    // depois de 700ms: some emoji, reaparece botão em outro lugar
    setTimeout(() => {
      sad.classList.remove("show");
      sad.classList.add("hide");
      posicaoAleatoria();
      setTimeout(() => {
        refuse.classList.remove("hide");
        refusing = false;
      }, 250);
    }, 700);
  }

  function abrirBau() {
    document.getElementById("bau-page").classList.add("show");
  }

  let cofreAberto = false;
  function abrirCofre() {
    if (cofreAberto) return;
    cofreAberto = true;
    document.getElementById("bau-hint").style.opacity = "0";
    document.getElementById("chest-lid").classList.add("open");
    document.getElementById("chest-gift").classList.add("show");
    document.getElementById("gift-msg").classList.add("show");
    document.getElementById("btn-voltar").classList.add("show");
  }

  function voltarHero() {
    document.getElementById("bau-page").classList.remove("show");
    cofreAberto = false;
    document.getElementById("chest-lid").classList.remove("open");
    document.getElementById("chest-gift").classList.remove("show");
    document.getElementById("gift-msg").classList.remove("show");
    document.getElementById("btn-voltar").classList.remove("show");
    document.getElementById("bau-hint").style.opacity = "1";
  }
</script>
