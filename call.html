<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minha Página</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #111;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    img {
      max-width: 90%;
      max-height: 80vh;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
    }

    p {
      color: #fff;
      font-size: 2rem;
      font-family: 'Georgia', serif;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <img
      src="https://i.pinimg.com/736x/c1/6b/16/c16b16f9863be433121de81ae805602c.jpg"
      alt="Imagem"
    />
    <p>Call? :3</p>
  </div>
</body>
</html>
